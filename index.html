<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RSS 旅遊風分頁看板（24h）</title>
<style>
:root{--sky:#6FB6E9;--coral:#FF7F50;--cream:#FAF6EF;--forest:#2F6B4F;--ink:#1F2937;--muted:#6B7280;--card:#fff}
*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--ink);font:16px/1.6 "Noto Sans TC","Segoe UI",sans-serif}
.hero{min-height:34vh;padding:52px 20px 30px;color:#fff;background:linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.4)),url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=1800&q=80') center/cover no-repeat;display:flex;align-items:flex-end}
.hero h1{margin:0 0 6px;font-size:clamp(28px,5vw,50px)}.container{max-width:1160px;margin:18px auto 50px;padding:0 16px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{border:0;border-radius:999px;padding:10px 14px;background:#e7eef5;cursor:pointer}.tab.active{background:var(--sky);color:#fff}
.meta{color:var(--muted);font-size:14px;margin-bottom:10px}.grid{display:grid;gap:12px;grid-template-columns:repeat(2,minmax(0,1fr))}
.card{background:var(--card);border-radius:16px;box-shadow:0 6px 18px rgba(0,0,0,.08);padding:14px 16px;border-top:4px solid var(--coral)}h3{margin:0 0 8px;font-size:17px}
.sum{margin:0 0 10px;color:#374151;background:#f8fafc;border-left:4px solid var(--sky);padding:8px 10px;border-radius:8px}.orig{margin:0 0 8px;color:var(--muted);font-size:13px}
ul.bul{margin:0 0 10px 18px;padding:0} ul.bul li{margin:0 0 4px} a{color:var(--forest);text-decoration:none;word-break:break-all}a:hover{text-decoration:underline}@media (max-width:900px){.grid{grid-template-columns:1fr}}
</style></head><body>
<header class="hero"><div><h1>RSS 旅遊風分頁看板</h1><p>僅近24小時｜第1-3分頁不抓內文｜第4-5分頁逐篇三行統整｜更新時間（GMT+8）：2026-03-22 09:32</p></div></header>
<main class="container"><nav id="tabs" class="tabs"></nav><div id="meta" class="meta"></div><section id="view"></section></main>
<script>
const feeds=[{"name": "rss.app/feeds/MgIGamWmXuClDHjb.xml", "url": "https://rss.app/feeds/MgIGamWmXuClDHjb.xml", "items": []}, {"name": "rss.app/feeds/9bfukpjKgWBWWagy.xml", "url": "https://rss.app/feeds/9bfukpjKgWBWWagy.xml", "items": []}, {"name": "rss.app/feeds/05fuO2HWVVmpj2Oo.xml", "url": "https://rss.app/feeds/05fuO2HWVVmpj2Oo.xml", "items": []}, {"name": "www.ptt.cc/atom/Lifeismoney.xml", "url": "https://www.ptt.cc/atom/Lifeismoney.xml", "items": []}, {"name": "www.kocpc.com.tw/feed", "url": "https://www.kocpc.com.tw/feed", "items": []}]; const tabNames=['SHL','ADAT','Taoyuan','省錢','阿達'];
const adKeywords=['廣告','店家分享','店名','招生','外送','電話','專線','優惠','只要','開幕','預約','課程','促銷','買一送一'];
const tabs=document.getElementById('tabs'), view=document.getElementById('view'), meta=document.getElementById('meta');
function isAdPost(item){const t=`${item.title||''} ${item.title_zh||''}`;return adKeywords.some(k=>t.includes(k));}
function render(i){const f=feeds[i];document.querySelectorAll('.tab').forEach((b,idx)=>b.classList.toggle('active',idx===i));const raw=f.items||[];const items=(i===2)?raw.filter(it=>!isAdPost(it)):raw;const removed=raw.length-items.length;meta.textContent=`來源：${f.url}｜顯示：${items.length} 則${i===2?`（已過濾廣告 ${removed} 則）`:''}`;if(!items.length){view.innerHTML='<article class="card">近24小時無新文章</article>';return;}
view.innerHTML=`<div class="grid">${items.map(it=>`<article class="card"><h3>${it.title_zh}</h3>${(i===3||i===4)?`<ul class="bul"><li>${(it.bullets&&it.bullets[0])||'—'}</li><li>${(it.bullets&&it.bullets[1])||'—'}</li><li>${(it.bullets&&it.bullets[2])||'—'}</li></ul>`:`<p class="sum">統整：${it.summary}</p>`}<p class="orig">原文：${it.title}</p><div class="meta">發佈時間（GMT+8）：${it.time}</div><a href="${it.link}" target="_blank" rel="noopener">查看原文</a></article>`).join('')}</div>`;}
feeds.forEach((f,i)=>{const b=document.createElement('button');b.className='tab'+(i===0?' active':'');b.textContent=tabNames[i]||f.name;b.onclick=()=>render(i);tabs.appendChild(b);});if(feeds.length) render(0); else view.innerHTML='<article class="card">沒有 feed 資料</article>';
</script></body></html>
