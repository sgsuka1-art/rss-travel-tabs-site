const adKeywords=['廣告','店家分享','店名','招生','外送','電話','專線','優惠','只要','開幕','預約','課程','促銷','買一送一'];
function isAdPost(item){

 return adKeywords.some(k=>t.includes(k));
}
function render(i){
 const f=feeds[i];
 document.querySelectorAll('.tab').forEach((b,idx)=>b.classList.toggle('active',idx===i));
 const rawItems=f.items||[];
 const items=(i===2)?rawItems.filter(it=>!isAdPost(it)):rawItems;
 const removed=rawItems.length-items.length;
 meta.textContent=`來源：${f.url}｜顯示：${items.length} 則${i===2?`（已過濾廣告 ${removed} 則）`:''}`;
 if(!items.length){view.innerHTML='<article class="card">目前沒有資料</article>';return;}
 view.innerHTML=`<div class="grid">${items.map(it=>`<article class="card"><h3>${it.title_zh}</h3><p class="sum">統整：${it.summary}</p><p class="orig">原文：${it.title}</p><div class="meta">發佈時間（GMT+8）：${it.time}</div><a href="${it.link}" target="_blank" rel="noopener">查看原文</a></article>`).join('')}</div>`;
}
