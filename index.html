function isAdPost(item){const t=`${item.title||''} ${item.title_zh||''}`;return adKeywords.some(k=>t.includes(k));}
function render(i){const f=feeds[i];document.querySelectorAll('.tab').forEach((b,idx)=>b.classList.toggle('active',idx===i));const raw=f.items||[];const items=(i===2)?raw.filter(it=>!isAdPost(it)):raw;const removed=raw.length-items.length;meta.textContent=`來源：${f.url}｜顯示：${items.length} 則${i===2?`（已過濾廣告 ${removed} 則）`:''}`;if(!items.length){view.innerHTML='<article class="card">目前沒有資料</article>';return;}view.innerHTML=`<div class="grid">${items.map(it=>`<article class="card"><h3>${it.title_zh}</h3><p class="sum">統整：${it.summary}</p><p class="orig">原文：${it.title}</p><div class="meta">發佈時間（GMT+8）：${it.time}</div><a href="${it.link}" target="_blank" rel="noopener">查看原文</a></article>`).join('')}</div>`;}
feeds.forEach((f,i)=>{const b=document.createElement('button');b.className='tab'+(i===0?' active':'');b.textContent=tabNames[i]||f.name;b.onclick=()=>render(i);tabs.appendChild(b);});if(feeds.length) render(0); else view.innerHTML='<article class="card">沒有 feed 資料</article>';
</script></body></html>
